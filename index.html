<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lavant Web Browser Hub</title>
  <style>
    :root {
      --bg-dark: #121214;
      --bg-surface: #1a1a1e;
      --bg-input: #29292e;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --text-main: #ffffff;
      --text-muted: #aaaaaa;
    }

    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Global Dashboard Header */
    header { background: var(--bg-surface); padding: 15px 20px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #29292e; gap: 10px; position: relative; }
    .search-wrapper { position: relative; width: 100%; max-width: 600px; display: flex; align-items: center; }
    #searchBar { width: 100%; padding: 12px 50px 12px 15px; border-radius: 8px; border: none; background: var(--bg-input); color: white; font-size: 15px; outline: none; }
    #openCreateModal { position: absolute; right: 10px; background: var(--accent); border: none; color: white; width: 32px; height: 32px; border-radius: 6px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    #openCreateModal:hover { background: var(--accent-hover); }

    /* Recent Items Screen Space */
    main { flex: 1; padding: 30px; overflow-y: auto; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box; }
    h2 { margin-top: 0; font-size: 22px; color: var(--text-main); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
    .card { background: var(--bg-surface); border: 1px solid #29292e; border-radius: 10px; padding: 20px; cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; }
    .card:hover { transform: translateY(-3px); border-color: var(--accent); }
    .card-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; color: #fff; }
    .card-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: bold; }
    
    /* Pop-up Modals System */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal-content { background: var(--bg-surface); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 450px; text-align: center; position: relative; }
    .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
    .modal-close:hover { color: #fff; }
    .modal-buttons { display: flex; gap: 15px; margin-top: 25px; }
    .btn-large { flex: 1; padding: 20px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .btn-article { background: #e91e63; }
    .btn-article:hover { background: #c2185b; }
    .btn-website { background: #00bcd4; color: #111; }
    .btn-website:hover { background: #0097a7; }

    /* Dynamic Application Workspace Screens */
    .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 200; display: none; flex-direction: column; }
    .screen-header { background: var(--bg-surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #29292e; }
    .screen-body { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; }
    
    /* Controls Framework */
    .sidebar-controls { width: 300px; background: var(--bg-surface); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; box-sizing: border-box; }
    .canvas { flex: 1; background: white; border-radius: 8px; color: black; padding: 30px; overflow-y: auto; box-sizing: border-box; }
    
    input[type="text"], textarea, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: var(--bg-input); color: white; box-sizing: border-box; }
    .btn-action { background: var(--accent); color: white; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
    .btn-action:hover { background: var(--accent-hover); }

    /* Viewer Modal Frame styling */
    #viewerFrame { width: 100%; height: 100%; border: none; background: white; }
  </style>
</head>
<body>

  <header>
    <div class="search-wrapper">
      <input type="text" id="searchBar" placeholder="Search saved articles and websites...">
      <button id="openCreateModal">+</button>
    </div>
  </header>

  <main>
    <h2>Most Recent Creation Feeds</h2>
    <div id="creationGrid" class="grid">
      </div>
  </main>

  <div id="createModal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('createModal')">×</button>
      <h3 style="margin-top:0; font-size: 24px;">Create New Artifact</h3>
      <p style="color: var(--text-muted); font-size: 14px;">Choose the production workspace engine required for building your next web element.</p>
      <div class="modal-buttons">
        <button class="btn-large btn-article" onclick="openScreen('articleScreen')">📝 <span>Article</span></button>
        <button class="btn-large btn-website" onclick="openScreen('websiteScreen')">🌐 <span>Website</span></button>
      </div>
    </div>
  </div>

  <div id="articleScreen" class="screen">
    <div class="screen-header">
      <h3>Lavant Article Production Framework</h3>
      <div>
        <button class="btn-action" style="background:#444; margin-right:10px;" onclick="closeScreen('articleScreen')">Cancel</button>
        <button class="btn-action" id="saveArticleBtn">Publish Document</button>
      </div>
    </div>
    <div class="screen-body">
      <div class="sidebar-controls">
        <label>Document Meta Title</label>
        <input type="text" id="artTitle" placeholder="Enter article name...">
        <hr style="border-color:#333; width:100%;">
        <label>Canvas Settings</label>
        <select id="artBg">
          <option value="#ffffff">Pure White Canvas</option>
          <option value="#f4f4f9">Soft Classic Gray</option>
          <option value="#fff9db">Vintage Warm Cream</option>
          <option value="#e3faf2">Modern Tech Mint</option>
        </select>
        <label>Inject Media Node (URL Image)</label>
        <input type="text" id="artImg" placeholder="https://source.unsplash.com/random">
        <label>Hyperlink Integration</label>
        <input type="text" id="artLink" placeholder="https://wikipedia.org">
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
        <textarea id="artBody" style="flex:1; background:white; color:black; padding:20px; font-size:16px; font-family:serif;" placeholder="Type your rich article text layer structural content directly here..."></textarea>
      </div>
    </div>
  </div>

  <div id="websiteScreen" class="screen">
    <div class="screen-header">
      <h3>Highly Advanced Website Builder</h3>
      <div>
        <button class="btn-action" style="background:#444; margin-right:10px;" onclick="closeScreen('websiteScreen')">Cancel</button>
        <button class="btn-action" id="saveWebsiteBtn">Publish Site Webspace</button>
      </div>
    </div>
    <div class="screen-body">
      <div class="sidebar-controls">
        <label>Web Domain Project Title</label>
        <input type="text" id="webTitle" placeholder="My Premium Platform">
        <hr style="border-color:#333; width:100%;">
        <label>Visual Object Snippet Injector</label>
        <button class="btn-action" style="background:#4a5568;" onclick="injectTemplate('hero')">+ Insert Responsive Hero Header</button>
        <button class="btn-action" style="background:#4a5568;" onclick="injectTemplate('cards')">+ Insert 3-Column Features</button>
        <button class="btn-action" style="background:#4a5568;" onclick="injectTemplate('footer')">+ Insert Production Footer</button>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:15px;">
        <div style="flex:1; display:flex; flex-direction:column;">
          <span style="font-size:12px; padding-bottom:5px; color:var(--text-muted);">Source HTML Component Architecture View</span>
          <textarea id="webHtml" style="flex:1; font-family:monospace; background:#0d0e12; color:#a3e635; resize:none;" placeholder=""></textarea>
        </div>
      </div>
    </div>
  </div>

  <div id="viewerModal" class="modal-overlay" style="padding:40px;">
    <div class="modal-content" style="max-width:95%; width:100%; height:90%; display:flex; flex-direction:column; padding:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 10px;">
        <span id="viewerModalTitle" style="font-weight:bold; color:white;">Viewport Live Context Stream</span>
        <button class="btn-action" style="background:#ef4444; padding:4px 10px;" onclick="closeModal('viewerModal')">Exit Sandbox Frame</button>
      </div>
      <iframe id="viewerFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // Your production Web System profile configurations vectors
    const firebaseConfig = {
      apiKey: "AIzaSyCvWmCMX0TeNFDnHIDZgmuylTAjbwVFsAk",
      authDomain: "lavant-hub.firebaseapp.com",
      databaseURL: "https://lavant-hub-default-rtdb.firebaseio.com",
      projectId: "lavant-hub",
      storageBucket: "lavant-hub.firebasestorage.app",
      messagingSenderId: "54929531188",
      appId: "1:54929531188:web:36e3b528c849193979c561",
      measurementId: "G-8QNTYKSQKN"
    };

    // Instantiate Database
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const creationsRef = ref(database, 'creations');

    let allCreationsLocalArray = [];

    // Navigation UI Layer Triggers
    document.getElementById('openCreateModal').onclick = () => document.getElementById('createModal').style.display = 'flex';
    
    window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };
    window.closeScreen = function(id) { document.getElementById(id).style.display = 'none'; };
    
    window.openScreen = function(screenId) {
      closeModal('createModal');
      document.getElementById(screenId).style.display = 'flex';
    };

    // Website Block Object Component Generators
    window.injectTemplate = function(type) {
      const codeField = document.getElementById('webHtml');
      let blocks = "";
      if (type === 'hero') {
        blocks = `\n<section style="background:linear-gradient(135deg, #5865f2, #4752c4); color:white; padding:60px 20px; text-align:center; font-family:sans-serif; border-radius:8px;">\n  <h1 style="font-size:3rem; margin:0;">Welcome to Lavant Pro</h1>\n  <p style="font-size:1.2rem; opacity:0.9;">Designed directly inside our cutting-edge website builder.</p>\n  <button style="background:white; color:#5865f2; border:none; padding:12px 24px; font-weight:bold; border-radius:6px; cursor:pointer; margin-top:15px;">Get Started</button>\n</section>\n`;
      } else if (type === 'cards') {
        blocks = `\n<div style="display:flex; gap:20px; margin-top:30px; font-family:sans-serif;">\n  <div style="flex:1; background:#f8fafc; padding:20px; border-radius:8px; border:1px solid #e2e8f0;">\n    <h3>Super Fast</h3>\n    <p>Rendered natively inside independent optimization clusters.</p>\n  </div>\n  <div style="flex:1; background:#f8fafc; padding:20px; border-radius:8px; border:1px solid #e2e8f0;">\n    <h3>Cloud Synced</h3>\n    <p>Saved instantly to our unified Firebase distributed infrastructure.</p>\n  </div>\n</div>\n`;
      } else if (type === 'footer') {
        blocks = `\n<footer style="margin-top:50px; border-top:1px solid #e2e8f0; padding:20px; text-align:center; font-family:sans-serif; color:#64748b; font-size:14px;">\n  © ${new Date().getFullYear()} Generated via Lavant System Dashboard Suite.\n</footer>\n`;
      }
      codeField.value += blocks;
    };

    // Cloud Publishers Systems
    document.getElementById('saveArticleBtn').onclick = function() {
      const title = document.getElementById('artTitle').value.trim() || "Untitled Document Framework";
      const htmlContent = `
        <div style="background:${document.getElementById('artBg').value}; min-height:100vh; padding:40px; font-family:serif; line-height:1.6; color:#111;">
          <h1 style="font-size:2.5rem; border-bottom:2px solid #333; padding-bottom:10px;">${title}</h1>
          ${document.getElementById('artImg').value ? `<img src="${document.getElementById('artImg').value}" style="max-width:100%; border-radius:6px; margin:20px 0; max-height:400px; object-fit:cover; display:block;">` : ''}
          <p style="font-size:1.2rem; white-space:pre-wrap;">${document.getElementById('artBody').value}</p>
          ${document.getElementById('artLink').value ? `<br><a href="${document.getElementById('artLink').value}" target="_blank" style="color:#5865f2; font-weight:bold; font-family:sans-serif;">Read External Sources Link →</a>` : ''}
        </div>`;
      
      push(creationsRef, { title, type: 'article', data: htmlContent }).then(() => {
        closeScreen('articleScreen');
        resetArticleInputs();
      });
    };

    document.getElementById('saveWebsiteBtn').onclick = function() {
      const title = document.getElementById('webTitle').value.trim() || "Untitled Dynamic Webspace";
      const codeCompiled = `<div style="background:white; color:black; min-height:100vh; padding:20px;">${document.getElementById('webHtml').value}</div>`;
      
      push(creationsRef, { title, type: 'website', data: codeCompiled }).then(() => {
        closeScreen('websiteScreen');
        document.getElementById('webTitle').value = '';
        document.getElementById('webHtml').value = '';
      });
    };

    function resetArticleInputs() {
      document.getElementById('artTitle').value = ''; document.getElementById('artBody').value = '';
      document.getElementById('artImg').value = ''; document.getElementById('artLink').value = '';
    }

    // Interactive Render Pipelines
    window.launchViewer = function(title, type, index) {
      document.getElementById('viewerModalTitle').innerText = `🌐 Lavant Sandbox Viewport: [${type.toUpperCase()}] ${title}`;
      const iframe = document.getElementById('viewerFrame');
      
      // Inject the compiled dynamic document content into the sandboxed viewport window safely
      iframe.srcdoc = allCreationsLocalArray[index].data;
      document.getElementById('viewerModal').style.display = 'flex';
    };

    function renderFeedGrid(items) {
      const grid = document.getElementById('creationGrid');
      grid.innerHTML = '';
      
      if(items.length === 0) {
        grid.innerHTML = `<div style="color:var(--text-muted); padding:20px; grid-column: 1/-1; text-align:center;">No creations discovered matching the specified registry index.</div>`;
        return;
      }

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => launchViewer(item.title, item.type, index);
        card.innerHTML = `
          <div class="card-title">${item.title}</div>
          <div class="card-type" style="color:${item.type === 'article' ? '#e91e63' : '#00bcd4'}">${item.type}</div>
        `;
        grid.appendChild(card);
      });
    }

    // Cloud Listener & Frontend Sync Hook
    onValue(creationsRef, (snapshot) => {
      allCreationsLocalArray = [];
      if(snapshot.exists()) {
        const cloudData = snapshot.val();
        Object.keys(cloudData).reverse().forEach(key => {
          allCreationsLocalArray.push(cloudData[key]);
        });
      }
      renderFeedGrid(allCreationsLocalArray);
    });

    // Realtime Local Search Filter Engine Engine Logic
    document.getElementById('searchBar').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      const filtered = allCreationsLocalArray.filter(item => 
        item.title.toLowerCase().includes(query) || item.type.toLowerCase().includes(query)
      );
      renderFeedGrid(filtered);
    });
  </script>
</body>
</html>
